# personal: 個人アカウント / service: 会社共有サービスアカウント
account_mode: personal

slack:
  notify_channel: "#general"

confluence:
  base_url: https://your-domain.atlassian.net
  page_id: "123456789"

ms_graph:
  graph_base_url: https://graph.microsoft.com/v1.0
  login_base_url: https://login.microsoftonline.com
  scope: https://graph.microsoft.com/.default

excel:
  file_id: "your-excel-file-item-id"   # OneDrive/SharePoint の Drive Item ID
  drive_id: "your-drive-id"            # Drive ID（SharePoint/OneDriveのドライブID）
  sheet_name: "Sheet1"
  range:
    start_col: "A"
    end_col: "G"
